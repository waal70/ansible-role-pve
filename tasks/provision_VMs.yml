---
- name: "Create a clone"
  community.proxmox.proxmox_kvm:
    api_host: "{{ ansible_facts['hostname'] }}"
    api_user: "{{ api_user }}"
    api_token_id: "{{ api_token_id | default(omit) }}"
    api_token_secret: "{{ api_token | default(omit) }}"
    node: "{{ ansible_facts['hostname'] }}"
    clone: "{{ template_vm }}"
    full: true
    name: "{{ vmname }}"
    description: "{{ vmnotes }}"
    timeout: 500
  register: clone_result
  when: vmname not in active_vm_names

- name: Debug Mac address
  ansible.builtin.debug:
    msg: "Assigned MAC address for {{ vmname }} is: {{ vmmac | lower }}"

# Andre 2026-03: ALWAYS run this. Memory, VLAN or cores may have changed
- name: "Edit the VM's config via the API to set network settings"
  ansible.builtin.uri:
    url: "{{ proxmox_api }}nodes/{{ ansible_facts['hostname'] }}/qemu/{{ clone_result.vmid }}/config"
    method: PUT
    headers:
      Authorization: "{{ authstring }}"
    body_format: json
    body:
      net0: "model=virtio,bridge={{ default_bridge }},macaddr={{ vmmac | lower }}"
      tags: "{{ vmtags }}"
      memory: "{{ vmmemory }}"
      cores: "{{ vmcores }}"
      description: "{{ vmnotes }}"
    validate_certs: false
  when: vmvlan == omit

- name: "Edit the via API to set network settings, including VLAN"
  ansible.builtin.uri:
    url: "{{ proxmox_api }}nodes/{{ ansible_facts['hostname'] }}/qemu/{{ clone_result.vmid }}/config"
    method: PUT
    headers:
      Authorization: "{{ authstring }}"
    body_format: json
    body:
      net0: "model=virtio,bridge={{ default_bridge }},tag={{ vmvlan }},macaddr={{ vmmac | lower }}"
      tags: "{{ vmtags }}"
      memory: "{{ vmmemory }}"
      cores: "{{ vmcores }}"
      description: "{{ vmnotes }}"
    validate_certs: false
  when: vmvlan != omit

- name: "Retrieve info for this VM"
  community.proxmox.proxmox_vm_info:
    api_host: "{{ ansible_facts['hostname'] }}"
    api_user: "{{ api_user }}"
    api_token_id: "{{ api_token_id | default(omit) }}"
    api_token_secret: "{{ api_token | default(omit) }}"
    node: "{{ ansible_facts['hostname'] }}"
    name: "{{ vmname }}"
  register: clone_info
  retries: 5
  delay: 2
  until: clone_info.proxmox_vms | length > 0

- name: "Edit the VM via API, should the disk needs resizing. Only increasing size is supported."
  ansible.builtin.uri:
    url: "{{ proxmox_api }}nodes/{{ ansible_facts['hostname'] }}/qemu/{{ clone_info.proxmox_vms[0].vmid }}/resize"
    method: PUT
    headers:
      Authorization: "{{ authstring }}"
    body_format: json
    body:
      disk: scsi0
      size: "{{ vmdisk }}G"
    validate_certs: false
  when: (clone_info.proxmox_vms[0].maxdisk | int) < (vmdisk | int * 1024 * 1024 * 1024)

- name: "Start the cloned VM"
  community.proxmox.proxmox_kvm:
    api_host: "{{ ansible_facts['hostname'] }}"
    api_user: "{{ api_user }}"
    api_token_id: "{{ api_token_id | default(omit) }}"
    api_token_secret: "{{ api_token | default(omit) }}"
    node: "{{ ansible_facts['hostname'] }}"
    vmid: "{{ clone_info.proxmox_vms[0].vmid }}"
    state: restarted

- name: "Include tasks to resize partition inside the VM if needed"
  ansible.builtin.include_tasks: provision_resize.yml
  when: (clone_info.proxmox_vms[0].maxdisk | int) < (vmdisk | int * 1024 * 1024 * 1024)
